<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6EC"/>
      <stop offset="40%" style="stop-color:#F5E6D3"/>
      <stop offset="100%" style="stop-color:#F8E8E0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C78D6B"/>
      <stop offset="100%" style="stop-color:#C4704E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="100" r="220" fill="#C78D6B" opacity="0.08"/>
  <circle cx="1100" cy="80" r="140" fill="#C4704E" opacity="0.06"/>

  <!-- Decorative circle bottom-left -->
  <circle cx="120" cy="560" r="180" fill="#C4704E" opacity="0.07"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" fill="url(#accent)" rx="2"/>

  <!-- Brand name -->
  <text x="108" y="250" font-family="Georgia, serif" font-size="64" font-weight="300" font-style="italic" fill="#3D2B1F" letter-spacing="2">SKIN</text>
  <text x="268" y="250" font-family="Georgia, serif" font-size="44" font-weight="300" font-style="italic" fill="#C78D6B">@</text>
  <text x="308" y="250" font-family="Georgia, serif" font-size="64" font-weight="300" font-style="italic" fill="#3D2B1F">Mantraa</text>

  <!-- Tagline -->
  <text x="108" y="295" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#C4704E" letter-spacing="4">WHERE SCIENCE MEETS YOUR SKIN</text>

  <!-- Divider -->
  <rect x="108" y="320" width="480" height="1" fill="#C78D6B" opacity="0.4"/>

  <!-- Doctor name -->
  <text x="108" y="370" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#3D2B1F">Dr. Mamta Bhura</text>
  <text x="108" y="405" font-family="Arial, sans-serif" font-size="16" fill="#5C4033" letter-spacing="1">MBBS, MD Dermatology — BHU · 26+ Years Experience</text>

  <!-- Stats row -->
  <g transform="translate(108, 450)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#C78D6B">26+</text>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="12" fill="#5C4033" letter-spacing="1">YEARS EXP.</text>

    <!-- Divider -->
    <rect x="88" y="-20" width="1" height="50" fill="#C78D6B" opacity="0.3"/>

    <!-- Stat 2 -->
    <text x="102" y="0" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#C78D6B">451+</text>
    <text x="102" y="22" font-family="Arial, sans-serif" font-size="12" fill="#5C4033" letter-spacing="1">PATIENTS</text>

    <!-- Divider -->
    <rect x="200" y="-20" width="1" height="50" fill="#C78D6B" opacity="0.3"/>

    <!-- Stat 3 -->
    <text x="214" y="0" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#C78D6B">15+</text>
    <text x="214" y="22" font-family="Arial, sans-serif" font-size="12" fill="#5C4033" letter-spacing="1">TREATMENTS</text>
  </g>

  <!-- Location badge -->
  <rect x="108" y="520" width="220" height="34" rx="17" fill="#3D2B1F" opacity="0.08"/>
  <text x="218" y="541" font-family="Arial, sans-serif" font-size="13" fill="#3D2B1F" text-anchor="middle" letter-spacing="1">📍 Kanpur, Uttar Pradesh</text>

  <!-- Right side decorative element -->
  <circle cx="950" cy="315" r="180" fill="none" stroke="#C78D6B" stroke-width="1" opacity="0.2"/>
  <circle cx="950" cy="315" r="140" fill="none" stroke="#C78D6B" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="315" r="100" fill="none" stroke="#C78D6B" stroke-width="1" opacity="0.1"/>

  <!-- Skin icon placeholder in circle -->
  <text x="950" y="295" font-family="Arial, sans-serif" font-size="56" text-anchor="middle">✦</text>
  <text x="950" y="360" font-family="Georgia, serif" font-size="16" fill="#C78D6B" text-anchor="middle" letter-spacing="2" font-style="italic">skinmantraa.com</text>
</svg>
